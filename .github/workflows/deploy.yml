name: Manually Deploy to Heroku

on: workflow_dispatch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{d0091e87-9a43-479e-9762-5a39c6ad2ed7}}
          heroku_app_name: ${{akeno-mirrorbot}}
          heroku_email: ${{hakeno217@gmail.com}}
          usedocker: true
          docker_heroku_process_type: web
          stack: "container"
          region: "us"
        env:
          HD_CONFIG_FILE_URL: ${{config.env}}

